apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: mapreduce
  labels:
    app: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          command:
            - minio
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001

          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: MINIO_ROOT_PASSWORD

          volumeMounts:
            - name: minio-data
              mountPath: /data

          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"

  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
# Headless service — required by StatefulSet serviceName.
# Stable DNS: minio-0.minio.mapreduce.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: mapreduce
  labels:
    app: minio
spec:
  clusterIP: None
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# ClusterIP service — used by other pods to reach MinIO API at a stable address.
# DNS: minio-api.mapreduce.svc.cluster.local:9000
apiVersion: v1
kind: Service
metadata:
  name: minio-api
  namespace: mapreduce
  labels:
    app: minio
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
---
# NodePort — dev only. Access MinIO console from laptop:
# http://$(minikube ip):30900  →  API
# http://$(minikube ip):30901  →  Web console
apiVersion: v1
kind: Service
metadata:
  name: minio-nodeport
  namespace: mapreduce
  labels:
    app: minio
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      nodePort: 30900
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
---
# Job that runs once after MinIO starts to create the required buckets.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: mapreduce
  labels:
    app: minio-init
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait until the MinIO API is healthy before running mc.
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MinIO API..."
              until wget -q --spider http://minio-api.mapreduce.svc.cluster.local:9000/minio/health/ready; do
                echo "MinIO not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "MinIO is ready."
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: MINIO_ROOT_PASSWORD
          command:
            - sh
            - -c
            - |
              mc alias set local http://minio-api.mapreduce.svc.cluster.local:9000 \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"

              # input/   — users upload their data files here
              # jobs/    — intermediate files written by map workers (partitioned by reducer index)
              # output/  — final output files written by reduce workers
              # code/    — user-supplied mapper and reducer scripts
              mc mb --ignore-existing local/input
              mc mb --ignore-existing local/jobs
              mc mb --ignore-existing local/output
              mc mb --ignore-existing local/code

              echo "Buckets created successfully."
              mc ls local/
---
# PostgreSQL Primary — Distributed Data Service (DDS)
#
# Single-replica StatefulSet running postgres:16-alpine.
# Configured for streaming replication so a hot-standby replica can connect.
#
# Init scripts (run once on first boot, in filename order):
#   01_create_replicator.sh  — creates the replication role using the secret
#   02_configure_hba.sh      — appends replication entry to pg_hba.conf
#
# WAL / replication parameters are passed directly as server args.

# Init-scripts ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: mapreduce
data:
  # Create the streaming-replication role.
  # Uses $REPLICATOR_PASSWORD injected from the Secret so the password is never
  # hardcoded in plain text in this ConfigMap.
  01_create_replicator.sh: |
    #!/bin/bash
    set -euo pipefail
    echo "==> Creating replicator role..."
    psql -v ON_ERROR_STOP=1 \
         --username "$POSTGRES_USER" \
         --dbname   "$POSTGRES_DB" \
         <<-EOSQL
      DO \$\$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'replicator') THEN
          CREATE ROLE replicator WITH REPLICATION LOGIN PASSWORD '${REPLICATOR_PASSWORD}';
        END IF;
      END
      \$\$;
    EOSQL
    echo "==> replicator role ready."

  # Allow the replicator to open streaming-replication connections from
  # any pod in the cluster. This entry is appended to pg_hba.conf and takes
  # effect immediately (pg_ctl reload is called automatically by the entrypoint
  # after all init scripts finish).
  02_configure_hba.sh: |
    #!/bin/bash
    set -euo pipefail
    echo "==> Appending replication auth to pg_hba.conf..."
    cat >> "$PGDATA/pg_hba.conf" <<EOF
    # Streaming replication — allow replicator from any cluster pod
    host    replication     replicator      0.0.0.0/0               scram-sha-256
    EOF
    echo "==> pg_hba.conf updated."

---
# StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-primary
  namespace: mapreduce
  labels:
    app: postgres
    role: primary
spec:
  serviceName: postgres-primary
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: primary
  template:
    metadata:
      labels:
        app: postgres
        role: primary
    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: POSTGRES_DB
            # Inject so the init script can use it without hardcoding.
            - name: REPLICATOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: REPLICATOR_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_HOST_AUTH_METHOD
              value: "scram-sha-256"
            - name: POSTGRES_INITDB_ARGS
              value: "--auth-host=scram-sha-256 --auth-local=trust"

          # Server parameters — passed as postgres CLI flags so they apply
          # on every restart without needing a custom postgresql.conf.
          args:
            - "-c"
            - "wal_level=replica"
            - "-c"
            - "max_wal_senders=5"
            - "-c"
            - "max_replication_slots=5"
            - "-c"
            - "hot_standby=on"
            - "-c"
            - "hot_standby_feedback=on"
            - "-c"
            - "wal_keep_size=256"       # keep 256 MB of WAL for slow replicas
            - "-c"
            - "shared_buffers=128MB"
            - "-c"
            - "effective_cache_size=512MB"
            - "-c"
            - "work_mem=4MB"
            - "-c"
            - "maintenance_work_mem=64MB"
            - "-c"
            - "checkpoint_completion_target=0.9"
            - "-c"
            - "log_min_duration_statement=500"
            - "-c"
            - "log_connections=on"
            - "-c"
            - "log_replication_commands=on"

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d/

          readinessProbe:
            exec:
              command: [pg_isready, -U, mapreduce, -d, mapreduce]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6

          livenessProbe:
            exec:
              command: [pg_isready, -U, mapreduce, -d, mapreduce]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"

      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init-scripts
            defaultMode: 0755   # scripts must be executable

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
# Headless Service (required by StatefulSet + app write connections)
# Stable DNS: postgres-primary-0.postgres-primary.mapreduce.svc.cluster.local
# Also used by application DSNs:
#   postgres://...@postgres-primary.mapreduce.svc.cluster.local:5432/...
# For a single-replica StatefulSet, the headless DNS resolves directly to
# the pod IP, making a separate ClusterIP service unnecessary.
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: mapreduce
  labels:
    app: postgres
    role: primary
spec:
  clusterIP: None
  selector:
    app: postgres
    role: primary
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
# NodePort — dev / port-forward access
# kubectl port-forward svc/postgres-nodeport 5432:5432 -n mapreduce
apiVersion: v1
kind: Service
metadata:
  name: postgres-nodeport
  namespace: mapreduce
  labels:
    app: postgres
    role: primary
spec:
  type: NodePort
  selector:
    app: postgres
    role: primary
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      nodePort: 30532---
# PostgreSQL Read Replica — Streaming Hot Standby
#
# A single hot-standby replica that:
#   1. Clones the primary via pg_basebackup in an init container.
#   2. Runs as a hot standby (read-only queries allowed).
#   3. Applies WAL from the primary continuously via streaming replication.
#
# Application services use POSTGRES_DSN_READONLY to spread read load:
#   postgres://...@postgres-replica.mapreduce.svc.cluster.local:5432/...
#
# Deploy AFTER the primary is ready and the replicator role exists:
#   kubectl rollout status statefulset/postgres-primary -n mapreduce
#   kubectl apply -f 08_postgres_replica.yml
#
# To promote to primary (emergency failover):
#   kubectl exec postgres-replica-0 -n mapreduce -- \
#     pg_ctl promote -D /var/lib/postgresql/data/pgdata

# StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-replica
  namespace: mapreduce
  labels:
    app: postgres
    role: replica
spec:
  serviceName: postgres-replica
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: replica
  template:
    metadata:
      labels:
        app: postgres
        role: replica
    spec:
      terminationGracePeriodSeconds: 30

      initContainers:
        # pg_basebackup init container
        # Runs ONCE (or whenever the PVC is empty) to clone the primary.
        # pg_basebackup -R writes:
        #   - standby.signal              → postgres starts as standby
        #   - postgresql.auto.conf        → primary_conninfo for streaming
        # The main container then starts postgres and finds these files.
        - name: pg-basebackup
          image: postgres:16-alpine
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail

              PRIMARY="postgres-primary-0.postgres-primary.mapreduce.svc.cluster.local"
              PGDATA="/var/lib/postgresql/data/pgdata"

              # If PGDATA already has a PG_VERSION file the replica is already
              # initialised (e.g. pod restart). Skip pg_basebackup.
              if [ -f "$PGDATA/PG_VERSION" ]; then
                echo "==> Data directory already exists, skipping basebackup."
                exit 0
              fi

              echo "==> Waiting for primary to accept connections..."
              until pg_isready -h "$PRIMARY" -U replicator -d postgres 2>/dev/null; do
                echo "    Primary not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "==> Primary is ready."

              echo "==> Running pg_basebackup..."
              PGPASSWORD="$REPLICATOR_PASSWORD" pg_basebackup \
                --host="$PRIMARY"       \
                --username=replicator   \
                --pgdata="$PGDATA"      \
                --wal-method=stream     \
                --write-recovery-conf   \
                --progress              \
                --checkpoint=fast

              # Fix ownership: the main container runs as uid 999 (postgres).
              chown -R 999:999 "$PGDATA"
              echo "==> Basebackup complete."

          env:
            - name: REPLICATOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: REPLICATOR_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          volumeMounts:
            - name: postgres-replica-data
              mountPath: /var/lib/postgresql/data

          securityContext:
            runAsUser: 0   # root; needed to chown after pg_basebackup

      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          # hot_standby=on allows read-only queries against the standby.
          args:
            - "-c"
            - "hot_standby=on"
            - "-c"
            - "hot_standby_feedback=on"
            - "-c"
            - "shared_buffers=128MB"
            - "-c"
            - "effective_cache_size=512MB"
            - "-c"
            - "work_mem=4MB"
            - "-c"
            - "log_min_duration_statement=500"
            - "-c"
            - "log_connections=on"

          volumeMounts:
            - name: postgres-replica-data
              mountPath: /var/lib/postgresql/data

          readinessProbe:
            exec:
              command: [pg_isready, -U, mapreduce, -d, mapreduce]
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6

          livenessProbe:
            exec:
              command: [pg_isready, -U, mapreduce, -d, mapreduce]
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"

  volumeClaimTemplates:
    - metadata:
        name: postgres-replica-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
# Headless Service (required by StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: mapreduce
  labels:
    app: postgres
    role: replica
spec:
  clusterIP: None
  selector:
    app: postgres
    role: replica
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
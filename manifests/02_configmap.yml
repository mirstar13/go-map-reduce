apiVersion: v1
kind: ConfigMap
metadata:
  name: mapreduce-config
  namespace: mapreduce
data:
  # PostgreSQL
  POSTGRES_HOST:            "postgres-primary.mapreduce.svc.cluster.local"
  POSTGRES_PORT:            "5432"
  POSTGRES_DB:              "mapreduce"
  PG_MAX_CONNECTIONS:       "100"
  PG_SHARED_BUFFERS:        "128MB"
  PG_EFFECTIVE_CACHE_SIZE:  "512MB"
  PG_WORK_MEM:              "4MB"
  PG_WAL_LEVEL:             "replica"
  PG_MAX_WAL_SENDERS:       "3"
  PG_MAX_REPLICATION_SLOTS: "3"

  # MinIO
  MINIO_ENDPOINT:      "minio-api.mapreduce.svc.cluster.local:9000"
  MINIO_BUCKET_INPUT:  "input"
  MINIO_BUCKET_JOBS:   "jobs"
  MINIO_BUCKET_OUTPUT: "output"
  MINIO_BUCKET_CODE:   "code"

  # Manager Service 
  MANAGER_API_URL:        "http://manager-api.mapreduce.svc.cluster.local:8080"
  MANAGER_REPLICAS:       "2"
  WORKER_NAMESPACE:       "mapreduce"
  WORKER_IMAGE:           "mirstar13/mapreduce-worker:latest"
  TASK_TIMEOUT_SECONDS:   "300"
  TASK_MAX_RETRIES:       "3"

  #  Auth / UI Service 
  AUTH_SERVICE_URL: "http://auth-api.mapreduce.svc.cluster.local:8082"

  # Keycloak
  KEYCLOAK_URL:       "http://keycloak.mapreduce.svc.cluster.local:8080"
  KEYCLOAK_REALM:     "mapreduce"
  KEYCLOAK_CLIENT_ID: "mapreduce-ui"

  # Misc
  # Kept for informational use; actual expiry is controlled by Keycloak's
  # accessTokenLifespan setting in the realm JSON above.
  JWT_EXPIRY_SECONDS: "86400"
apiVersion: v1
kind: ConfigMap
metadata:
  name: mapreduce-config
  namespace: mapreduce
data:
  POSTGRES_HOST:    "postgres-primary.mapreduce.svc.cluster.local"
  POSTGRES_PORT:    "5432"
  POSTGRES_DB:      "mapreduce"

  # These are passed to the postgres container as runtime config.
  # Sized conservatively for minikube (2 CPU / 4 GB RAM).
  # Increase for production / Okeanos deployment.
  PG_MAX_CONNECTIONS:       "100"
  PG_SHARED_BUFFERS:        "128MB"
  PG_EFFECTIVE_CACHE_SIZE:  "512MB"
  PG_WORK_MEM:              "4MB"
  PG_WAL_LEVEL:             "replica"   # enables streaming replication later
  PG_MAX_WAL_SENDERS:       "3"         # max replica connections to primary
  PG_MAX_REPLICATION_SLOTS: "3"
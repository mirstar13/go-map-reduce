apiVersion: v1
kind: Secret
metadata:
  name: mapreduce-secrets
  namespace: mapreduce
type: Opaque
stringData:
  POSTGRES_USER:         "mapreduce"
  POSTGRES_PASSWORD:     "mapreduce_dev"
  POSTGRES_DB:           "mapreduce"
  # Full DSN used by services via pgxpool.
  # Points to the primary service — always write here.
  POSTGRES_DSN: "postgres://mapreduce:mapreduce_dev@postgres-primary.mapreduce.svc.cluster.local:5432/mapreduce?sslmode=disable"
  # Read-only DSN — currently same as primary.
  # When you add replicas, point this to postgres-replica service instead.
  POSTGRES_DSN_READONLY: "postgres://mapreduce:mapreduce_dev@postgres-primary.mapreduce.svc.cluster.local:5432/mapreduce?sslmode=disable"
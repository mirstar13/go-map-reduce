---
# ============================================================
# Keycloak — Identity Provider (Stateful, single replica)
# ============================================================
#
# Keycloak is deployed as a StatefulSet so its persistent volume
# survives pod restarts. A single replica is sufficient for our
# project; a production setup would run multiple replicas behind
# an Infinispan/JGroups cluster, which is out of scope here.
#
# The realm, client, and roles are imported at startup from the
# JSON ConfigMap mounted at /opt/keycloak/data/import/.
# Keycloak's --import-realm flag processes these files once on
# first boot (they are ignored if the realm already exists).
# ============================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: mapreduce
  labels:
    app: keycloak
spec:
  serviceName: keycloak-discovery
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      terminationGracePeriodSeconds: 60

      containers:
        - name: keycloak
          # Pin to a specific version for reproducible builds.
          image: quay.io/keycloak/keycloak:26.1.4
          args:
            - start-dev
            - --import-realm      # auto-import realm JSON on first boot
          ports:
            - name: http
              containerPort: 8080
            - name: jgroups
              containerPort: 7800
            - name: jgroups-fd
              containerPort: 57800
          env:
            # Bootstrap admin credentials (first-run only)
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: KC_BOOTSTRAP_ADMIN_USERNAME
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: KC_BOOTSTRAP_ADMIN_PASSWORD

            # Database (use our existing PostgreSQL)
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: KEYCLOAK_POSTGRES_DSN
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: POSTGRES_PASSWORD

            # KC_HOSTNAME* vars are intentionally omitted.
            # start-dev disables hostname enforcement — setting them causes
            # Keycloak 26 to fail to start with "not a valid URL" errors.

            # Enable the management interface on port 9000 (health/metrics)
            - name: KC_HEALTH_ENABLED
              value: "true"

            # Logging
            - name: KC_LOG_LEVEL
              value: "INFO"

            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: KC_CACHE_EMBEDDED_NETWORK_BIND_ADDRESS
              value: '$(POD_IP)'

            - name: KC_CACHE
              value: "local"

          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          startupProbe:
            httpGet:
              path: /health/started
              port: 9000
            periodSeconds: 10
            failureThreshold: 30   # up to 5 min for slow first-boot builds

          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"

      volumes:
        # Realm JSON is mounted from the ConfigMap below.
        # Keycloak reads it once at startup via --import-realm.
        - name: realm-import
          configMap:
            name: keycloak-realm-import

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: mapreduce
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-discovery
  namespace: mapreduce
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  clusterIP: None
  type: ClusterIP
---
# ============================================================
# Realm Bootstrap ConfigMap
#
# This JSON is processed by Keycloak's --import-realm flag.
# It provisions:
#   - realm:   "mapreduce"
#   - client:  "mapreduce-ui"  (public OIDC client, password grant enabled)
#   - roles:   "user", "admin"
#   - mappers: realm_access.roles → "roles" claim in tokens
#
# Edit this file to add more clients, identity providers, or
# fine-grained policies. Re-apply the ConfigMap and delete the
# Keycloak pod to re-import (only safe if the realm does not
# yet exist in the DB — otherwise Keycloak skips the import).
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  namespace: mapreduce
data:
  mapreduce-realm.json: |
    {
      "realm": "mapreduce",
      "enabled": true,
      "displayName": "MapReduce Platform",
      "registrationAllowed": true,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": false,
      "accessTokenLifespan": 86400,
      "ssoSessionMaxLifespan": 86400,

      "requiredActions": [
        {
          "alias": "VERIFY_PROFILE",
          "name": "Verify Profile",
          "providerId": "VERIFY_PROFILE",
          "enabled": false,
          "defaultAction": false,
          "priority": 90,
          "config": {}
        },
        {
          "alias": "UPDATE_PASSWORD",
          "name": "Update Password",
          "providerId": "UPDATE_PASSWORD",
          "enabled": true,
          "defaultAction": false,
          "priority": 30,
          "config": {}
        },
        {
          "alias": "VERIFY_EMAIL",
          "name": "Verify Email",
          "providerId": "VERIFY_EMAIL",
          "enabled": true,
          "defaultAction": false,
          "priority": 50,
          "config": {}
        }
      ],

      "roles": {
        "realm": [
          { "name": "user",  "description": "Regular user; can submit and view own jobs" },
          { "name": "admin", "description": "Administrator; full system access" }
        ]
      },

      "clients": [
        {
          "clientId": "mapreduce-ui",
          "name": "MapReduce UI Service",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": false,
          "redirectUris": ["*"],
          "webOrigins": ["*"],
          "defaultClientScopes": ["openid", "profile", "email", "roles"],
          "optionalClientScopes": [],
          "protocolMappers": [
            {
              "name": "sub",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-sub-mapper",
              "consentRequired": false,
              "config": {
                "access.token.claim": "true",
                "id.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
      ],

      "users": [
        {
          "username": "admin",
          "email": "admin@mapreduce.local",
          "enabled": true,
          "emailVerified": true,
          "requiredActions": [],
          "credentials": [
            { "type": "password", "value": "admin", "temporary": false }
          ],
          "realmRoles": ["admin", "user"],
          "clientRoles": {
            "account": ["manage-account", "view-profile", "manage-account-links"]
          }
        },
        {
          "username": "alice",
          "email": "alice@mapreduce.local",
          "enabled": true,
          "emailVerified": true,
          "requiredActions": [],
          "credentials": [
            { "type": "password", "value": "alice", "temporary": false }
          ],
          "realmRoles": ["user"],
          "clientRoles": {
            "account": ["manage-account", "view-profile", "manage-account-links"]
          }
        }
      ]
    }

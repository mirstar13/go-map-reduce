apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: mapreduce
  labels:
    app: db-migrate
spec:
  # Clean up the completed Job pod automatically after 5 minutes.
  ttlSecondsAfterFinished: 300
  # Never retry — if migrations fail the problem must be fixed manually.
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      restartPolicy: Never

      initContainers:
        # Wait until PostgreSQL is accepting connections before running
        # the migrations. This prevents a race condition where the Job
        # starts before postgres-primary-0 is fully ready.
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until nc -z postgres-primary.mapreduce.svc.cluster.local 5432; do
                echo "  postgres not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "PostgreSQL is ready."

      containers:
        - name: migrate
          image: starpal/mapreduce-migrate:latest
          imagePullPolicy: Always

          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: mapreduce-secrets
                  key: POSTGRES_DSN

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"